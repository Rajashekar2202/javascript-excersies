<!doctype html>
<html>
  <head></head>
  <body>
    <script>
      function isSameProduct(product1, product2) {
        if (
          product1.price === product2.price &&
          product1.name === product2.name
        ) {
          return true;
        } else {
          return false;
        }
      }
      const product1 = {
        name: "basketball",
        price: 2000,
      };
      const product2 = {
        name: "basketball",
        price: 2000,
      };

      console.log(isSameProduct(product1, product2));
    </script>
  </body>
</html>
